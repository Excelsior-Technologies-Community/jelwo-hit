<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Simple Pearl Earrings | Product Page</title>
    <!-- Font Awesome 6 (free icons for stars, shopping, leaf, etc) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts for clean typography -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="pearlearrings.css">
</head>

<body>
    <div class="product-card">
        <div class="product-grid">
            <!-- LEFT COLUMN: PHOTO SECTION - EMPTY PLACEHOLDER WITH PROPER SPACE FOR USER PHOTO -->
            <div class="photo-placeholder">
                <img src="https://jelwo.myshopify.com/cdn/shop/files/jewelry-product-6.jpg?v=1742442751" alt="">
            </div>

            <!-- RIGHT COLUMN: PRODUCT DETAILS -->
            <div class="product-details">
                <h1 class="product-title">Simple Pearl earrings</h1>

                <!-- rating stars (4 stars exactly as described) -->
                <div class="rating">
                    <div class="stars">
                        <i class="fas fa-star"></i>
                        <i class="fas fa-star"></i>
                        <i class="fas fa-star"></i>
                        <i class="fas fa-star"></i>
                    </div>
                    <span class="rating-text">4.0 · 126 reviews</span>
                </div>

                <!-- price + sale block -->
                <div class="price-container">
                    <span class="current-price">Rs. 15.00</span>
                    <span class="original-price">Rs. 20.00</span>
                    <span class="sale-badge">Sale 25%</span>
                </div>
                <div class="tax-shipping">
                    <i class="fas fa-receipt" style="font-size: 0.7rem; margin-right: 6px;"></i> Tax included. Shipping
                    calculated at checkout.
                </div>

                <!-- stock with icon -->
                <div class="stock-info">
                    <i class="fas fa-hourglass-half"></i>
                    <span>16 in stock</span>
                </div>
                <!-- care & sustainability (Join Life label) -->
                <div class="care-section">
                    <div class="care-text">
                        <p><h3>Care for fiber: 30% more recycled polyester. We label garments manufactured using environmentally friendly technologies and raw materials with the Join Life label.</h3></p>
                    </div>
                </div>

                <!-- color selection -->
                <!-- <div class="color-row">
                    <span><i class="fas fa-palette"></i> Color:</span>
                    <span class="color-value">Gold</span>
                    <span class="color-value">Brown</span>
                    <span class="color-value">Sliver</span>
                </div> -->
                <div class="option-block">
                
                
                
                
                    <input type="radio" id="quickadd-template--18033475158153__product-template-1-0" name="Color" value="Gold"
                        form="product-form-quickadd-template--18033475158153__product-template" class="swatch-input__input" checked="">
                    <label for="quickadd-template--18033475158153__product-template-1-0" title="Gold"
                        class="op-lb color cust-checkbox-label ">
                
                        <span class="color-swatch cust-check swatch" style="--swatch--background: rgb(212 154 6);"></span>
                
                        <span class="visually-hidden">Gold</span>
                    </label>
                
                
                
                    <input type="radio" id="quickadd-template--18033475158153__product-template-1-1" name="Color" value="Brown"
                        form="product-form-quickadd-template--18033475158153__product-template" class="swatch-input__input">
                    <label for="quickadd-template--18033475158153__product-template-1-1" title="Brown"
                        class="op-lb color cust-checkbox-label ">
                
                        <span class="color-swatch cust-check swatch" style="--swatch--background: rgb(154 86 48);"></span>
                
                        <span class="visually-hidden">Brown</span>
                    </label>
                
                
                
                    <input type="radio" id="quickadd-template--18033475158153__product-template-1-2" name="Color" value="Silver"
                        form="product-form-quickadd-template--18033475158153__product-template" class="swatch-input__input">
                    <label for="quickadd-template--18033475158153__product-template-1-2" title="Silver"
                        class="op-lb color cust-checkbox-label ">
                
                        <span class="color-swatch cust-check swatch" style="--swatch--background: rgb(211 211 211);"></span>
                
                        <span class="visually-hidden">Silver</span>
                    </label>
                
                </div>

                <!-- quantity selector + interactive -->
                <div class="quantity-section">
                    <div class="quantity-selector">
                        <button class="qty-btn" id="decrementQty" aria-label="Decrease quantity">−</button>
                        <span class="quantity-number" id="quantityValue">1</span>
                        <button class="qty-btn" id="incrementQty" aria-label="Increase quantity">+</button>
                    </div>
                    <!-- <div class="stock-note">
                        <i class="fas fa-check-circle" style="color:#3b8b4e;"></i> max 16 pieces
                    </div> -->
                </div>

                <!-- action buttons -->
                <div class="button-group">
                    <button class="btn-primary" id="addToCartBtn">
                        <i class="fas fa-bag-shopping"></i> ADD TO CART
                    </button>
                    <button class="btn-outline" id="buyNowBtn">
                        <i class="fas fa-bolt"></i> BUY IT NOW
                    </button>
                </div>

                
            </div>
        </div>
    </div>

    
</body>

</html>
