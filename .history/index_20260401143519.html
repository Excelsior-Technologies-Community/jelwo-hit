<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jelwo - Jewelry Store</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- navbar -->
    <nav class="nav">
        <div class="nav-inner">
            <a class="nav-logo" href="#"><img src="https://jelwo.myshopify.com/cdn/shop/files/jewelry-4-logo.png?v=1744805986&width=500" alt=""></a>
            <span class="nav-sep">|</span>
            <h1 class="nav-tagline">Free UK standard delivery on all orders.</h1>
            <div class="nav-actions">
                <form class="nav-search">
                    <input type="text" placeholder="Search product...">
                    <i class="fa-solid fa-search nav-search-icon"></i>
                </form>
                <button class="nav-btn"><i class="fa-solid fa-user-plus"></i></button>
                <button class="nav-btn"><i class="fa-regular fa-heart"></i>(<span id="count">0</span>)</button>
                <button class="nav-btn"><i class="fa-solid fa-bag-shopping"></i>(<span
                        id="cart-count">0</span>)</button>
            </div>
            <button class="nav-mobile-btn" id="mobileMenuBtn" aria-label="Menu">
                <i class="fa-solid fa-bars"></i>
            </button>
        </div>
        <div class="nav-mobile" id="mobileMenu">
            <a href="#" class="nav-mobile-link">Home</a>
            <a href="#" class="nav-mobile-link">Shop</a>
            <a href="#" class="nav-mobile-link">Product</a>
            <a href="#" class="nav-mobile-link">Blog</a>
            <a href="#" class="nav-mobile-link">Pages</a>
        </div>
    </nav>
</body>

</html>
